name: Version Bump

on:
  push:
    branches:
      - main

jobs:
  bump:
    # Evita loop infinito se o commit for do próprio bot
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || github.token }}
      - name: Bump version
        id: bump_version
        run: |
          # Pega a mensagem do último commit
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          VERSION_LINE=$(grep "^version: " pubspec.yaml)
          FULL_VERSION=$(echo $VERSION_LINE | cut -d' ' -f2)
          VERSION=$(echo $FULL_VERSION | cut -d'+' -f1)
          BUILD=$(echo $FULL_VERSION | cut -d'+' -f2)
          
          # Incrementa build number
          NEW_BUILD=$((BUILD + 1))
          
          IFS='.' read -ra ADDR <<< "$VERSION"
          MAJOR=${ADDR[0]}
          MINOR=${ADDR[1]}
          PATCH=${ADDR[2]}
          
          # Lógica de Versionamento Semântico
          # Regex guardados em variável para evitar conflito do ) com [[ =~ ]]
          RE_BREAKING='^[a-zA-Z]+(\([^)]*\))?!:'
          RE_FEAT='^feat(\([^)]*\))?:'

          # MAJOR: tipo! ou BREAKING CHANGE no corpo
          if [[ "$COMMIT_MSG" =~ $RE_BREAKING ]] || [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            BUMP_TYPE="major"
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          # MINOR: feat
          elif [[ "$COMMIT_MSG" =~ $RE_FEAT ]]; then
            BUMP_TYPE="minor"
            MINOR=$((MINOR + 1))
            PATCH=0
          # PATCH: fix, perf, refactor, e qualquer outro
          else
            BUMP_TYPE="patch"
            PATCH=$((PATCH + 1))
          fi
          echo "Bump type: $BUMP_TYPE"
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_LINE="version: $NEW_VERSION+$NEW_BUILD"
          sed -i "s/^version: .*/$NEW_LINE/" pubspec.yaml
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$NEW_VERSION+$NEW_BUILD" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.full_version }} [skip ci]"
          git push
          
      - name: Create and push tag
        run: |
          NEW_TAG="v${{ steps.bump_version.outputs.new_version }}"
          git tag $NEW_TAG
          git push origin $NEW_TAG
