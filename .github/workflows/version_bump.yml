name: Version Bump

on:
  push:
    branches:
      - main

jobs:
  bump:
    # Evita loop infinito se o commit for do próprio bot
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump_version
        run: |
          VERSION_LINE=$(grep "^version: " pubspec.yaml)
          FULL_VERSION=$(echo $VERSION_LINE | cut -d' ' -f2)
          VERSION=$(echo $FULL_VERSION | cut -d'+' -f1)
          BUILD=$(echo $FULL_VERSION | cut -d'+' -f2)
          
          # Incrementa build number
          NEW_BUILD=$((BUILD + 1))
          
          # Incrementa patch version (ex: 1.0.0 -> 1.0.1)
          IFS='.' read -ra ADDR <<< "$VERSION"
          MAJOR=${ADDR[0]}
          MINOR=${ADDR[1]}
          PATCH=${ADDR[2]}
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          NEW_LINE="version: $NEW_VERSION+$NEW_BUILD"
          sed -i "s/^version: .*/$NEW_LINE/" pubspec.yaml
          
          echo "new_version=$NEW_VERSION+$NEW_BUILD" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }}"
          git push
