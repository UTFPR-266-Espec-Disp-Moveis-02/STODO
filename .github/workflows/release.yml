name: Release App

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Semantic Changelog
        id: changelog
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Changelog de $PREVIOUS_TAG até $TAG"

          COMMITS=$(git log "$PREVIOUS_TAG..$TAG" --pretty=format:"%s")

          BREAKING=$(echo "$COMMITS" | grep -E "^[a-zA-Z]+(\([^)]*\))?!:|BREAKING CHANGE" || true)
          FEATURES=$(echo "$COMMITS" | grep -E "^feat(\([^)]*\))?:"  || true)
          FIXES=$(echo "$COMMITS"    | grep -E "^fix(\([^)]*\))?:"   || true)
          PERFS=$(echo "$COMMITS"    | grep -E "^perf(\([^)]*\))?:"  || true)
          OTHERS=$(echo "$COMMITS"   | grep -vE "^(feat|fix|perf|chore)(\([^)]*\))?" || true)

          CHANGELOG="## O que mudou na versão $TAG\n\n"
          [ -n "$BREAKING"  ] && CHANGELOG+="### ⚠️ Breaking Changes\n$BREAKING\n\n"
          [ -n "$FEATURES"  ] && CHANGELOG+="### ✨ Novas Funcionalidades\n$FEATURES\n\n"
          [ -n "$FIXES"     ] && CHANGELOG+="### 🐛 Correções\n$FIXES\n\n"
          [ -n "$PERFS"     ] && CHANGELOG+="### ⚡ Performance\n$PERFS\n\n"
          [ -n "$OTHERS"    ] && CHANGELOG+="### 🔧 Outras Alterações\n$OTHERS\n\n"

          DELIM=$(openssl rand -hex 8)
          echo "CHANGELOG<<$DELIM" >> $GITHUB_ENV
          echo -e "$CHANGELOG"     >> $GITHUB_ENV
          echo "$DELIM"            >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body: ${{ env.CHANGELOG }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
