name: Release App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag para a release (ex: v1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Tag Name
        id: tag_name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Semantic Changelog
        id: changelog
        run: |
          TAG="${{ steps.tag_name.outputs.tag }}"
          # Tenta encontrar a tag anterior
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Gerando changelog de $PREVIOUS_TAG até $TAG"
          
          # Coleta os commits e agrupa por tipo
          COMMITS=$(git log "$PREVIOUS_TAG..$TAG" --oneline --pretty=format:"%s")
          
          FEATURES=$(echo "$COMMITS" | grep -E "^feat(\(.*\))?(!)?:" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^fix(\(.*\))?(!)?:" || true)
          BREAKING=$(echo "$COMMITS" | grep -E "(!:)|(BREAKING CHANGE)" || true)
          OTHERS=$(echo "$COMMITS" | grep -vE "^(feat|fix)(\(.*\))?(!)?:" || true)
          
          CHANGELOG="## 🚀 O que mudou na versão $TAG\n\n"
          
          if [ ! -z "$BREAKING" ]; then
            CHANGELOG="$CHANGELOG### ⚠️ BREAKING CHANGES\n$BREAKING\n\n"
          fi
          
          if [ ! -z "$FEATURES" ]; then
            CHANGELOG="$CHANGELOG### ✨ Novas Funcionalidades\n$FEATURES\n\n"
          fi
          
          if [ ! -z "$FIXES" ]; then
            CHANGELOG="$CHANGELOG### 🐛 Correções\n$FIXES\n\n"
          fi
          
          if [ ! -z "$OTHERS" ]; then
            CHANGELOG="$CHANGELOG### 🛠️ Outras Alterações\n$OTHERS\n\n"
          fi
          
          # Escapa quebras de linha para o GITHUB_ENV usando um delimitador aleatório
          EOF_DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64 | tr -dc 'a-zA-Z0-9')
          echo "CHANGELOG<<$EOF_DELIMITER" >> $GITHUB_ENV
          echo -e "$CHANGELOG" >> $GITHUB_ENV
          echo "$EOF_DELIMITER" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.tag }}
          name: Release ${{ steps.tag_name.outputs.tag }}
          body: ${{ env.CHANGELOG }}
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
